<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý Phòng Khám</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f7f6; 
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-header {
            background-color: #dcedc8; /* Màu xanh nhạt giống bản thiết kế Access */
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        .login-header h2 {
            color: #333;
            font-size: 22px;
            text-transform: uppercase;
        }
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            justify-content: space-between;
        }
        .form-group label {
            font-weight: bold;
            flex: 1;
            text-align: left;
        }
        .form-group input {
            flex: 2;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn {
            padding: 10px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background-color: #e0e0e0;
            color: #333;
        }
        .btn:hover { background-color: #d5d5d5; }
        .btn-login { background-color: #b3e5fc; } /* Màu xanh dương nhạt */
        .btn-login:hover { background-color: #81d4fa; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>QUẢN LÝ PHÒNG KHÁM TƯ NHÂN</h2>
        </div>
        
        <form action="index.html" method="GET">
            <div class="form-group">
                <label for="username">Tên đăng nhập:</label>
                <input type="text" id="username" name="username" value="admin01" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" value="********" required>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn btn-login">Đăng nhập</button>
                <button type="button" class="btn">Thoát</button>
            </div>
        </form>
    </div>

</body>
</html>
